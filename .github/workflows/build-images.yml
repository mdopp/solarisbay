name: build-images

# Build and publish container images for Solaris.
#
# - On push to `main` and tags `v*`: builds + pushes to GHCR.
# - On pull requests touching image sources: builds without pushing,
#   so Dockerfiles are validated before merge.
# - On workflow_dispatch: builds + pushes for the dispatched ref (branch or tag).
#   Use `gh workflow run build-images.yml --ref vX.Y.Z` to manually publish
#   a versioned release (replaces the delete+repush workaround for #256).

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'voice-gatekeeper/**'
      - 'database/**'
      - 'solaris-chat/**'
      - 'tts-martin/**'
      - 'tts-martin/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    paths:
      - 'voice-gatekeeper/**'
      - 'database/**'
      - 'solaris-chat/**'
      - 'tts-martin/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag, e.g. v0.3.0). Defaults to the ref selected when running the workflow.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: solaris-gatekeeper
            context: voice-gatekeeper
            description: "Solaris Wyoming-to-Hermes bridge — STT/TTS pipeline orchestration, Phase-2 speaker ID. Runs as a container inside the SolarisBay pod; reaches ServiceBay's voice template via host loopback (both pods hostNetwork)."
          - image: solaris-gatekeeper-ml
            context: voice-gatekeeper
            build_args: |
              EXTRAS=[speaker-id]
            description: "Solaris gatekeeper with Phase-2 speaker-ID baked in (SpeechBrain + torch / ECAPA). Same bridge as solaris-gatekeeper; use this image and set SOLARIS_SPEAKER_ID_ENABLED=true to resolve the speaking resident per turn. Larger image (torch); biometric."
          - image: solaris-schema-init
            context: database
            description: "Solaris schema-init sidecar — runs alembic upgrade head against the SolarisBay pod's local SQLite (solaris.db) on every pod start. Idempotent."
          - image: solaris-tts
            context: tts-martin
            description: "Solaris's voice — Kokoro-82M ONNX German single speaker Martin (Apache-2.0, vendored from Godelaune/Kokoro-82M-ONNX-German-Martin with the model baked in). OpenAI-compatible /v1/audio/speech on :8881; KOKORO_ONNX_PROVIDER=cuda puts the 82M model on the GPU."
          - image: solaris-chat
            context: solaris-chat
            inject_version: true
            description: "Solaris chat — the Solaris Engine agent core (direct Ollama agent loop, HA tools, scheduler, crons) with its chat surface and the Ollama-compatible facade for HA Assist. Reads the Authelia Remote-User header for SSO; holds SOLARIS_API_KEY server-side."
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so `git describe --tags` can compute the
          # SOLARIS_VERSION badge value (shallow checkout sees no tags).
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.context }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.context }}/Dockerfile not present on this ref; skipping ${{ matrix.image }} build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Compute version
        if: steps.check.outputs.exists == 'true' && matrix.inject_version
        id: version
        run: |
          # git-describe yields the clean tag on a tag build (e.g. v0.3.0) and a
          # tag-relative descriptor on main (e.g. v0.2.0-12-ga6e9164). Strip the
          # leading 'v' — the badge prepends its own, so 'main' would show 'vmain'
          # but '0.2.0-12-g...' shows 'v0.2.0-12-g...'.
          echo "v=$(git describe --tags --always | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Build (and push on main/tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.inject_version && format('SOLARIS_VERSION={0}', steps.version.outputs.v) || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Solaris">
  <!-- Solaris brand mark — the Solaris figure (a human lit from within by
       knowledge) floating in the thinking ocean of #3B82F6 ServiceBay blue.
       Adopted from mdopp/solaris-android ic_maskable (batch/design-pass, #768).
       The figure is the original brand mark; only the field is blue. -->
  <defs>
    <radialGradient id="solGold" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#3B82F6"/>
  <!-- outer person — the white "vessel" outline -->
  <g fill="#e8edf2">
    <circle cx="32" cy="16" r="8.5"/>
    <path d="M32 24 C 40.5 24 44.5 30 44.5 38
      C 44.5 48 41 56 38 59.5 C 37 60.8 34.5 61 32 61
      C 29.5 61 27 60.8 26 59.5 C 23 56 19.5 48 19.5 38
      C 19.5 30 23.5 24 32 24 Z"/>
  </g>
  <!-- the soul within: the glowing figure -->
  <g fill="url(#solGold)">
    <circle cx="32" cy="16" r="6"/>
    <path d="M32 26.5 C 39 26.5 41.8 31.5 41.8 38.5
      C 41.8 47.5 38.8 55 36 58 C 35.2 59 33.6 59.3 32 59.3
      C 30.4 59.3 28.8 59 28 58 C 25.2 55 22.2 47.5 22.2 38.5
      C 22.2 31.5 25 26.5 32 26.5 Z"/>
  </g>
</svg>

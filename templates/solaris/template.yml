apiVersion: v1
kind: Pod
metadata:
  name: solaris
  labels:
    app: solaris
  annotations:
    servicebay.label: "AI Assistant (Solaris)"
    servicebay.schema-version: "1"
    # Host ports on one tile: the chat server (the Solaris Engine + chat surface +
    # the Ollama-compatible facade HA's conversation agent calls) and the
    # gatekeeper's Wyoming listener. ServiceBay can't substitute a variable
    # placeholder inside an annotation block scalar (#136) but DOES substitute in
    # this inline annotation, so the ports stay variable-driven.
    servicebay.ports: "{{CHAT_PORT}}/tcp,{{GATEKEEPER_PORT}}/tcp,10400/tcp,10203/tcp"
    # External dependencies only (#271): ollama (the engine's LLM backend),
    # home-assistant (device control + the Assist pipeline that fronts the
    # Voice PE speaker), nginx (NPM proxies the chat), auth (Authelia
    # forward-auth gates it). Solaris now owns its whole voice pipeline —
    # Whisper STT, Kokoro-Martin TTS + bridge and the openWakeWord wake engine
    # are companion Quadlets written by post-deploy, so the ServiceBay `voice`
    # stack is no longer a dependency (#456).
    servicebay.dependencies: "ollama,home-assistant,nginx,auth"
    # One health probe for the service: the chat server serves /health (200,
    # no auth) once up. ServiceBay can't substitute a variable placeholder
    # inside an annotation block scalar (#136), so the port is the literal
    # default; an operator changing CHAT_PORT must update this literal by hand too.
    servicebay.healthcheck: |
      url: http://127.0.0.1:8787/health
      interval: 30s
      timeout: 5s
      startup_timeout: 5m
spec:
  # hostNetwork so the Pod's containers reach the external services over the
  # host loopback (every cooperating ServiceBay pod shares the host netns):
  #   - chat ↔ ollama at 127.0.0.1:11434, HA at 127.0.0.1:8123
  #   - HA's Assist pipeline ↔ the chat facade at 127.0.0.1:{{CHAT_PORT}}/ollama
  #   - gatekeeper ↔ voice (Whisper/Piper) at 127.0.0.1:10300 / 10200
  #   - NPM (also hostNetwork) proxies the chat from the host loopback
  #   - HA Voice PE satellites on the LAN reach HA; wyoming-satellite hardware
  #     reaches the gatekeeper at <host-ip>:<GATEKEEPER_PORT>
  hostNetwork: true
  restartPolicy: Always
  initContainers:
  # The notes vault is the file-share Syncthing share (host uid 1000),
  # bind-mounted at /opt/data/notes. The engine's notes tools (note_write,
  # fact_store) must be able to create/append notes regardless of which
  # subuid the share's files carry, so open the perms to a+rwX once per pod
  # start. Runs as userns-root (maps to the share owner) — same pattern the
  # Hermes-era init used.
  - name: notes-perms
    image: "{{CHAT_IMAGE}}"
    command: ["chmod", "-R", "a+rwX", "/opt/data/notes"]
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    volumeMounts:
    - mountPath: /opt/data/notes
      name: syncthing-notes
  # schema-init runs as a Kubernetes-style init container — podman supports
  # `initContainers:` on pod specs and treats it as run-to-completion before
  # regular containers start. With the unit `restartPolicy: Always` it would
  # thrash if declared under `containers:` (Alembic exits 0 → podman restarts
  # it → runs again → … forever); as an init container it runs exactly once
  # per pod start and stays Completed after the migrations land.
  - name: schema-init
    image: ghcr.io/mdopp/solaris-schema-init:latest
    env:
    - name: SOLARIS_DB_URL
      value: "sqlite:////var/lib/solaris/solaris.db"
    - name: SOLARIS_DEBUG_MODE_DEFAULT
      value: "{{SOLARIS_DEBUG_MODE}}"
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /var/lib/solaris
      name: solaris-data

  containers:
  # chat — the Solaris Engine: one process owns the agent loop (direct Ollama
  # /api/chat with per-turn model + reasoning), the session store
  # (solaris.db), native LLM tracing, the timer scheduler with speaker
  # delivery via HA assist_satellite.announce, the night crons, the chat
  # surface, and the Ollama-compatible facade (/ollama) that HA's `ollama`
  # integration uses so Solaris is the Assist conversation agent. Behind Authelia
  # forward-auth; the server reads the Remote-User header → resident uid so
  # there's no second login (#134). The container is named `chat` so the
  # podman pod-container name is `solaris-chat`.
  - name: chat
    image: "{{CHAT_IMAGE}}"
    env:
    - name: SOLARIS_COMPONENT
      value: "chat"
    # Bind loopback only — a 0.0.0.0 bind under hostNetwork would put the
    # chat surface on the LAN, bypassing Authelia. NPM, HA and the gatekeeper
    # reach it over the host loopback.
    - name: CHAT_HOST
      value: "127.0.0.1"
    - name: CHAT_PORT
      value: "{{CHAT_PORT}}"
    # Server-side bearer: HA's conversation agent and the gatekeeper present
    # it on the Ollama facade. Never in browser JS.
    - name: SOLARIS_API_KEY
      value: "{{SOLARIS_API_KEY}}"
    # Authelia forwards the authenticated identity on Remote-User via NPM;
    # the server folds it into the resident uid (#134). Absent header (direct
    # loopback offline test) falls back to DEFAULT_UID.
    - name: REMOTE_USER_HEADER
      value: "Remote-User"
    # Authelia also forwards the user's groups (comma-separated). The panel
    # surfaces admin-only controls (skill/soul/model edits) when this header
    # lists ADMIN_GROUP.
    - name: REMOTE_GROUPS_HEADER
      value: "Remote-Groups"
    - name: ADMIN_GROUP
      value: "admins"
    - name: DEFAULT_UID
      value: "{{DEFAULT_UID}}"
    # Read-write mount of the household skill pack: the panel edits it, the
    # engine reads cron-job skill bodies from it.
    - name: SKILLS_DIR
      value: "/data/skills"
    # The household soul on the chat-owned solaris-data volume (post-deploy
    # seeds it; the panel writes it directly). Read fresh per turn,
    # mtime-cached — an edit lands on the next turn, no restart.
    - name: SOUL_PATH
      value: "/var/lib/solaris/SOUL.md"
    # The operator persona: soul + skill pack folded into the admin profile's
    # prompt (read-only mount below).
    - name: ADMIN_SOUL_PATH
      value: "/data/admin-soul/SOUL.md"
    - name: ADMIN_SKILLS_DIR
      value: "/data/admin-soul"
    # The servicebay_admin MCP endpoint + the token file the post-deploy
    # mints (scopes read+lifecycle+mutate — no destroy/exec). Only the admin
    # profile's toolbox uses it; household turns never see these tools.
    - name: SB_MCP_URL
      value: "{{SERVICEBAY_MCP_URL}}"
    - name: SB_MCP_TOKEN_PATH
      value: "/var/lib/solaris/sb-admin-token"
    # The non-expiring read-only SB token (servicebay#2302) the unattended
    # pollers (update poller + approval-event SSE bridge) read so they don't
    # 401-churn when the rotating SB_MCP_TOKEN_PATH lapses (~1h TTL, #818). The
    # post-deploy mints it once and drops it here; the pollers fall back to
    # SB_MCP_TOKEN_PATH when this file is absent (pre-deploy).
    - name: SB_READ_TOKEN_PATH
      value: "/var/lib/solaris/sb-read-token"
    # ServiceBay control-plane base for the Authelia-session token exchange
    # (#794): the admin toolbox mints its SB-MCP token on demand from the
    # acting admin's live forward-auth identity (Remote-User/Remote-Groups →
    # POST /api/auth/token-from-authelia-session), so the pod holds no standing
    # token-minting credential. Host loopback, same as the MCP endpoint.
    - name: SB_API_URL
      value: "{{SERVICEBAY_API_URL}}"
    # ServiceBay's public portal base (through NPM) for the delegated-admin
    # session mint (servicebay#2278/#2285). The BFF forwards the acting admin's
    # authelia_session cookie to that mint; NPM's forward-auth validates the
    # cookie and injects the CSRF-exempt X-SB-Internal-Token. Must be a
    # *.dopp.cloud host (e.g. https://www.dopp.cloud) — the bare apex is Authelia
    # default-deny (401s even with a cookie) and loopback has neither the token
    # nor Authelia. Reads + the verdict keep the loopback base. Empty ⇒ fall back
    # to SB_API_URL (correct for a LAN/no-portal deploy).
    - name: SB_MINT_URL
      value: "{{SERVICEBAY_MINT_URL}}"
    # Context window (tokens) = the chat-compaction cap (#210) + /context.
    # Empty/auto => AUTO-DERIVE from the live Ollama active model at runtime
    # (#235). A positive integer OVERRIDES the derivation (ops control).
    - name: CONTEXT_WINDOW
      value: "{{CONTEXT_WINDOW}}"
    # Where Ollama's API lives (host loopback; hostNetwork pod) — the
    # engine's LLM backend.
    - name: OLLAMA_URL
      value: "{{OLLAMA_URL}}"
    # Optional Authelia logout URL for the sidebar footer; empty hides the
    # link (no dead link when unset).
    - name: LOGOUT_URL
      value: "{{LOGOUT_URL}}"
    # Where the server persists image attachments (#202).
    - name: ATTACHMENTS_DIR
      value: "/data/attachments"
    # CSP `frame-ancestors` source list (#228): who may iframe the chat.
    # Default `'self'`; the ServiceBay maintenance embed sets
    # `'self' https://admin.dopp.cloud` so admin.dopp.cloud can frame it.
    - name: FRAME_ANCESTORS
      value: "{{FRAME_ANCESTORS}}"
    # The engine model map: both FAST_MODEL and THOROUGH_MODEL default to e4b —
    # one resident LLM for everything on the 16 GB GPU (12b retired 2026-07-13).
    # "Gründlich" is e4b WITH reasoning/thought, not a bigger model; the admin
    # persona and night crons keep think_default on the same e4b. An admin may
    # re-point the household chat at another tag from the panel's Model picker
    # (#366) — that selection persists beside solaris.db, not a lock.
    - name: FAST_MODEL
      value: "{{FAST_MODEL}}"
    - name: THOROUGH_MODEL
      value: "{{THOROUGH_MODEL}}"
    # The Kokoro voices the panel's voice picker offers (#368), comma-separated;
    # the first is the default. The solaris-tts image bakes "martin", so that
    # stays the single default. The admin's selection persists beside solaris.db
    # and the post-deploy converges it into the Assist pipeline's tts_voice.
    - name: TTS_VOICES
      value: "{{TTS_VOICES}}"
    - name: TZ
      value: "{{TZ}}"
    # solaris.db holds the engine sessions/messages/timers/cron stamps plus
    # topics, mentions and traces. Same file the schema-init initContainer
    # migrates and the gatekeeper reads for voice speaker-ID.
    - name: SOLARIS_DB_PATH
      value: "/var/lib/solaris/solaris.db"
    # The Obsidian notes vault (Syncthing-synced) — the engine's notes tools
    # write here, the topic dashboard reads (#244).
    - name: NOTES_DIR
      value: "/opt/data/notes"
    # The engine's direct Home Assistant access: device-control tools, the
    # prompt-injected entity registry, and timer announcements on the PE
    # speaker (assist_satellite.announce).
    - name: HASS_URL
      value: "{{HASS_URL}}"
    - name: HASS_TOKEN
      value: "{{HASS_TOKEN}}"
    # An alarm (kind=alarm) rings a sound instead of speaking. ALARM_SOUND_MEDIA_ID
    # is the media_id passed to assist_satellite.announce — HA resolves the
    # media-source URI and the Voice PE plays it; the default
    # `solaris-alarm.ogg` is the royalty-free tone the skill pack ships, which
    # the post-deploy copies into HA's media folder. ALARM_SOUND_PATH is the
    # chat-visible copy of that file (via the skills mount): the scheduler
    # checks it exists before ringing and otherwise falls back to the TTS
    # sentence. To use your own tone, drop the file into HA's media folder
    # ({{DATA_DIR}}/home-assistant/homeassistant/media/) and point
    # ALARM_SOUND_MEDIA_ID at it (e.g. media-source://media_source/local/my-alarm.mp3).
    - name: ALARM_SOUND_MEDIA_ID
      value: "{{ALARM_SOUND_MEDIA_ID}}"
    - name: ALARM_SOUND_PATH
      value: "/data/skills/media/solaris-alarm.ogg"
    # The gatekeeper's in-pod HTTP listener (push + /enrol), reached over the
    # host loopback. The onboarding/self-enrol flow (#354, #396) POSTs to
    # /enrol here; PUSH_TOKEN must match the gatekeeper's PUSH_TOKEN below or
    # the engine's gatekeeper calls 401. The URL points at the gatekeeper's
    # PUSH_PORT (10750), not GATEKEEPER_PORT (the Wyoming listener).
    - name: GATEKEEPER_URL
      value: "http://127.0.0.1:10750"
    - name: PUSH_TOKEN
      value: "{{PUSH_TOKEN}}"
    # The household Immich instance the photo-ingest adapter reads (read-only,
    # #206) to map assets/faces/EXIF-geo into OKF events/people/places. Empty
    # IMMICH_BASE_URL disables the adapter; IMMICH_API_KEY is a read-only Immich
    # API key. Loopback when Immich runs on the same box (hostNetwork pod).
    - name: IMMICH_BASE_URL
      value: "{{IMMICH_BASE_URL}}"
    - name: IMMICH_API_KEY
      value: "{{IMMICH_API_KEY}}"
    # The household CalDAV calendar + CardDAV address book the calendar/contacts
    # ingest adapter reads (read-only, #207) to map events/contacts into OKF
    # event/person concepts. An empty CALDAV_URL/CARDDAV_URL disables that half.
    - name: CALDAV_URL
      value: "{{CALDAV_URL}}"
    - name: CALDAV_USERNAME
      value: "{{CALDAV_USERNAME}}"
    - name: CALDAV_PASSWORD
      value: "{{CALDAV_PASSWORD}}"
    - name: CARDDAV_URL
      value: "{{CARDDAV_URL}}"
    - name: CARDDAV_USERNAME
      value: "{{CARDDAV_USERNAME}}"
    - name: CARDDAV_PASSWORD
      value: "{{CARDDAV_PASSWORD}}"
    # The dedicated `solaris` DAV account + its two collection URLs — the WRITE
    # targets that sync document providers into a "Solaris Anbieter" address book
    # and deadlines into a "Solaris Fristen" calendar (#doc-graph). Authenticated
    # CardDAV/CalDAV PUT (owner_only scopes this account to its own collections) —
    # NOT a filesystem mount, NOT a resident's credentials. Empty URL ⇒ disabled.
    - name: SYNC_DAV_USERNAME
      value: "{{SYNC_DAV_USERNAME}}"
    - name: SYNC_DAV_PASSWORD
      value: "{{SYNC_DAV_PASSWORD}}"
    - name: CONTACTS_SYNC_URL
      value: "{{CONTACTS_SYNC_URL}}"
    - name: DEADLINES_SYNC_URL
      value: "{{DEADLINES_SYNC_URL}}"
    # The household Jellyfin server the music-ingest adapter reads (read-only,
    # #564) to map the music catalog into OKF band/song concepts. Reuses the
    # existing JELLYFIN_* stack vars (username/password, not an API key). An
    # empty JELLYFIN_URL disables the adapter.
    - name: JELLYFIN_URL
      value: "{{JELLYFIN_URL}}"
    # A castable stream URL must use a base the Cast device can reach on the LAN,
    # not the engine's localhost JELLYFIN_URL (#604). Empty reuses JELLYFIN_URL.
    - name: JELLYFIN_CAST_URL
      value: "{{JELLYFIN_CAST_URL}}"
    - name: JELLYFIN_USERNAME
      value: "{{JELLYFIN_USERNAME}}"
    - name: JELLYFIN_PASSWORD
      value: "{{JELLYFIN_PASSWORD}}"
    # Web Push / VAPID keys (#713): VAPID_PUBLIC_KEY is surfaced to the browser
    # via /api/whoami so it can subscribe; VAPID_PRIVATE_KEY (secret) + subject
    # sign the push. An operator prerequisite (generated once). All empty ⇒
    # Web Push no-ops end-to-end, so a deploy without them still boots.
    - name: VAPID_PUBLIC_KEY
      value: "{{VAPID_PUBLIC_KEY}}"
    - name: VAPID_PRIVATE_KEY
      value: "{{VAPID_PRIVATE_KEY}}"
    - name: VAPID_SUBJECT
      value: "{{VAPID_SUBJECT}}"
    # Android TWA / Digital Asset Links (#716): the /.well-known/assetlinks.json
    # route binds the app to this domain. ANDROID_CERT_FINGERPRINTS (comma-
    # separated SHA256 signing-cert fingerprints) is empty until the android
    # repo scaffolds the signing key — the route then serves `[]` (valid; Google
    # just won't verify yet), so a deploy without it still boots. Only publicly
    # reachable once SB adds a forwardAuth exception for /.well-known/* (tracked
    # separately).
    - name: ANDROID_PACKAGE
      value: "{{ANDROID_PACKAGE}}"
    - name: ANDROID_CERT_FINGERPRINTS
      value: "{{ANDROID_CERT_FINGERPRINTS}}"
    # No `ports:` block — hostNetwork pod, the listener binds the host
    # directly (loopback:{{CHAT_PORT}}); a ports mapping alongside
    # hostNetwork makes `podman kube play` reject the spec (same constraint
    # as the gatekeeper).
    volumeMounts:
    - mountPath: /data/skills
      name: solaris-skills
    - mountPath: /data/admin-soul
      name: admin-soul-skills
      readOnly: true
    - mountPath: /data/attachments
      name: solaris-chat-attachments
    - mountPath: /var/lib/solaris
      name: solaris-data
    - mountPath: /opt/data/notes
      name: syncthing-notes

  # gatekeeper — Solaris-published Wyoming bridge for wyoming-satellite
  # hardware (the Voice PE speaker rides HA's Assist pipeline instead, which
  # fronts the same engine via the chat facade). Resolves the speaking
  # resident (speaker-ID, #84) and the satellite's room, then runs the turn
  # against the engine's Ollama facade.
  - name: gatekeeper
    image: "{{GATEKEEPER_IMAGE}}"
    env:
    - name: SOLARIS_COMPONENT
      value: "gatekeeper"
    - name: GATEKEEPER_URI
      value: "tcp://0.0.0.0:{{GATEKEEPER_PORT}}"
    - name: WHISPER_URI
      value: "{{WHISPER_URI}}"
    - name: PIPER_URI
      value: "{{PIPER_URI}}"
    - name: OPENWAKEWORD_URI
      value: "{{OPENWAKEWORD_URI}}"
    # Voice always talks to the engine's household profile via the Ollama
    # facade on the chat server (host loopback). There is deliberately no
    # admin URL here — a voice turn can never reach the admin persona.
    - name: SOLARIS_ENGINE_URL
      value: "http://127.0.0.1:{{CHAT_PORT}}/ollama"
    - name: SOLARIS_API_KEY
      value: "{{SOLARIS_API_KEY}}"
    - name: DEFAULT_UID
      value: "{{DEFAULT_UID}}"
    # Push endpoint — proactive deliveries land here. Bound to loopback: a
    # 0.0.0.0 bind under hostNetwork would put this on the LAN, where a
    # blank PUSH_TOKEN is unauthenticated (#116). Not exposed via hostPort.
    - name: PUSH_HOST
      value: "127.0.0.1"
    - name: PUSH_PORT
      value: "10750"
    - name: PUSH_TOKEN
      value: "{{PUSH_TOKEN}}"
    # Room MCP server (set_room/list_rooms). Bound to loopback for the same
    # reason as PUSH_HOST (#116). MCP_PORT is hard-coded like PUSH_PORT.
    - name: MCP_HOST
      value: "127.0.0.1"
    - name: MCP_PORT
      value: "10760"
    - name: GATEKEEPER_MCP_TOKEN
      value: "{{GATEKEEPER_MCP_TOKEN}}"
    # JSON map of `<device-name> -> <wyoming-uri>` for push-to-device.
    # Empty by default; populated per household once devices are paired.
    - name: VOICE_PE_DEVICES
      value: '{{VOICE_PE_DEVICES}}'
    # Path to solaris.db so speaker-ID can read voice_embeddings.
    - name: SOLARIS_DB_PATH
      value: "/var/lib/solaris/solaris.db"
    # Speaker-ID (#84). Off by default. Turning it on requires the ML image
    # (set GATEKEEPER_IMAGE to ghcr.io/mdopp/solaris-gatekeeper-ml, which
    # bakes in SpeechBrain/torch) — with the default image the extractor
    # isn't importable and the gatekeeper safely falls back to DEFAULT_UID.
    # The ECAPA model is cached under /var/lib/solaris (the solaris-data
    # volume), so it downloads once. Biometric: stores per-resident voice
    # embeddings in solaris.db.voice_embeddings.
    - name: SOLARIS_SPEAKER_ID_ENABLED
      value: "{{SOLARIS_SPEAKER_ID_ENABLED}}"
    - name: SOLARIS_SPEAKER_ID_THRESHOLD
      value: "{{SOLARIS_SPEAKER_ID_THRESHOLD}}"
    - name: SOLARIS_DEBUG_MODE
      value: "{{SOLARIS_DEBUG_MODE}}"
    - name: TZ
      value: "{{TZ}}"
    volumeMounts:
    - mountPath: /var/lib/solaris
      name: solaris-data
    # No `ports:` block — `hostNetwork: true` (set on the pod) puts the
    # gatekeeper directly on the host netns, so its listener at
    # tcp://0.0.0.0:10700 already binds host port 10700. Adding port
    # mappings alongside hostNetwork makes `podman kube play` reject the
    # spec with "PortMappings can only be used with Bridge, slirp4netns,
    # or pasta networking" — observed during a household-stack install
    # 2026-05-25.

  # openwakeword — wake-word detection via the Wyoming protocol (#456). Solaris
  # owns its whole voice pipeline; the wake word is literally "Solaris" (#407),
  # a custom openWakeWord model. This container needs no GPU so it rides the
  # pod (unlike whisper + the Kokoro TTS, which are GPU companion Quadlets the
  # post-deploy writes because podman kube play drops CDI devices, #1026). The
  # custom-models dir is mounted from {{OPENWAKEWORD_CUSTOM_DIR}} (the same host
  # path the post-deploy drops the trained solaris.tflite into) and scanned via
  # --custom-model-dir, so the "Solaris" model shows up as a selectable wake
  # word the Assist pipeline then pins (ensure_assist_pipeline). Listens on the
  # standard Wyoming wake-word port 10400 (OPENWAKEWORD_URI default).
  - name: openwakeword
    image: docker.io/rhasspy/wyoming-openwakeword:latest
    args:
    - --uri
    - tcp://0.0.0.0:10400
    - --custom-model-dir
    - /custom_models
    volumeMounts:
    - mountPath: /custom_models
      name: openwakeword-custom-models

  # tts-bridge — the wyoming_openai bridge that fronts the Kokoro-Martin TTS as
  # a streaming `tts.openai_streaming` HA entity on Wyoming :10203 (#456). A CPU
  # shim, so it rides the pod (unlike the Kokoro TTS itself, a GPU companion
  # Quadlet). It reaches the Kokoro OpenAI API over host loopback (:8881); the
  # bare module command mirrors the standalone container's entrypoint.
  - name: tts-bridge
    image: ghcr.io/roryeckel/wyoming_openai:latest
    command:
    - python3
    - -m
    - wyoming_openai
    args:
    - --uri
    - tcp://0.0.0.0:10203
    - --languages
    - de
    - --tts-openai-url
    - http://127.0.0.1:8881/v1
    - --tts-models
    - kokoro
    - --tts-streaming-models
    - kokoro
    - --tts-backend
    - KOKORO_FASTAPI

  volumes:
  # Custom openWakeWord models (#456 folds in #407): the host dir the
  # post-deploy drops the trained "Solaris" solaris.tflite into; the
  # openwakeword container scans it for custom wake words.
  - name: openwakeword-custom-models
    hostPath:
      path: {{OPENWAKEWORD_CUSTOM_DIR}}
      type: DirectoryOrCreate
  # Household skill pack: shipped by ServiceBay's asset transport from this
  # template's skills/household/ to {{DATA_DIR}}/solaris/skills/household/.
  # Mounted read-write into the chat container (panel edits; the engine
  # reads cron-job skill bodies).
  - name: solaris-skills
    hostPath:
      path: {{DATA_DIR}}/solaris/skills/household
      type: DirectoryOrCreate
  # Operator skill pack + soul (#176): shipped by the asset transport from
  # this template's skills/admin-soul/. Read-only — the admin profile's
  # prompt assembly reads it.
  - name: admin-soul-skills
    hostPath:
      path: {{DATA_DIR}}/solaris/skills/admin-soul
      type: DirectoryOrCreate
  # Notes vault (Syncthing share): the engine's notes tools write, the topic
  # dashboard reads.
  - name: syncthing-notes
    hostPath:
      path: {{DATA_DIR}}/file-share/data/notes
      type: DirectoryOrCreate
  # Image-attachment store (#202): re-rendered in chat history after refresh.
  - name: solaris-chat-attachments
    hostPath:
      path: {{DATA_DIR}}/solarisbay/chat-attachments
      type: DirectoryOrCreate
  # The Solaris data volume holds solaris.db (SQLite, populated by the
  # schema-init initContainer), the engine SOUL.md and the sb-admin-token
  # file. Reused as-is ({{DATA_DIR}}/solarisbay) — NO data migration.
  - name: solaris-data
    hostPath:
      path: {{DATA_DIR}}/solarisbay
      type: DirectoryOrCreate

# Post-deploy: ./post-deploy.py
#
# The slim engine-era sequence:
#   1. engine soul   — seed/sync SOUL.md on the solaris-data volume (#283 guard).
#   2. HA            — adopt the long-lived token; auto-install the jellyfin
#                      integration; wire the VOICE PIPELINE (wyoming whisper +
#                      piper entries, the ollama-integration conversation agent
#                      pointing at the chat facade, the "Solaris" Assist pipeline,
